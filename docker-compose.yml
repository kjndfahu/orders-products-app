
services:
  mysql:
    image: mariadb:10.11
    container_name: orders_products_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: orders_products_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: orders_products_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: orders_products_db
      DATABASE_URL: mysql://root:rootpassword@mysql:3306/orders_products_db
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      API_PREFIX: /api/v1
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    command: ["sh", "-c", "npx prisma migrate deploy && npm run prisma:seed || true && npm run start"]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    container_name: orders_products_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  mysql_data:
